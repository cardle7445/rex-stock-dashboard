<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex 美股雷達 │ 即時版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .dashboard-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 212 255 / 0.1); }
        .metric-value { font-size: 2.25rem; line-height: 1; font-weight: 600; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-screen-2xl mx-auto">
        <!-- 頂部導航 -->
        <nav class="bg-black border-b border-zinc-800 px-8 py-5 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00d4ff] rounded-2xl flex items-center justify-center text-black font-bold text-2xl">📈</div>
                <h1 class="title-font text-3xl tracking-tighter">美股雷達</h1>
                <span class="text-xs bg-emerald-400 text-black px-2.5 py-0.5 rounded-full font-medium">Rex 即時版</span>
            </div>
            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a onclick="navigateTo(0)" class="cursor-pointer hover:text-[#00d4ff] active-nav">儀表板</a>
                <a onclick="navigateTo(1)" class="cursor-pointer hover:text-[#00d4ff]">我的持股</a>
                <a onclick="navigateTo(2)" class="cursor-pointer hover:text-[#00d4ff]">板塊比較</a>
                <a onclick="navigateTo(3)" class="cursor-pointer hover:text-[#00d4ff]">暴跌監測</a>
                <a onclick="navigateTo(4)" class="cursor-pointer hover:text-[#00d4ff]">追蹤報告</a>
            </div>
            <div class="flex items-center gap-x-4">
                <button onclick="refreshAllData()" class="flex items-center gap-x-2 bg-white text-black px-6 h-10 rounded-3xl font-medium hover:bg-[#00d4ff]">
                    <i class="fa-solid fa-rotate"></i> 刷新
                </button>
                <div id="market-status" class="text-emerald-400 text-sm"></div>
            </div>
        </nav>

        <!-- PAGE 0: 儀表板 -->
        <div id="page-0" class="page p-8">
            <h2 class="text-5xl title-font tracking-tighter mb-2">早安，Rex！</h2>
            <p class="text-zinc-400 mb-8">美股即時雷達 • Polygon.io 驅動</p>

            <!-- 指數卡 -->
            <div class="grid grid-cols-4 gap-4 mb-12" id="indices-grid"></div>

            <!-- 板塊 -->
            <div class="mb-12">
                <h3 class="text-2xl font-semibold mb-6">11大板塊漲跌</h3>
                <div class="grid grid-cols-11 gap-3" id="sectors-grid"></div>
            </div>

            <!-- 暴跌股票 -->
            <div class="mb-12">
                <h3 class="text-2xl font-semibold mb-6 flex items-center gap-x-3"><i class="fa-solid fa-triangle-exclamation text-red-500"></i>今日暴跌股票</h3>
                <div class="bg-zinc-900 rounded-3xl p-1" id="plunge-container"></div>
            </div>

            <div class="grid grid-cols-2 gap-8">
                <!-- 快速查詢 -->
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <h4 class="font-medium mb-6">快速查詢股票</h4>
                    <div class="flex gap-3">
                        <input id="quick-ticker" placeholder="NVDA" class="flex-1 bg-black border border-zinc-700 rounded-3xl px-6 py-4 outline-none">
                        <button onclick="lookupStock()" class="bg-[#00d4ff] text-black px-10 rounded-3xl font-medium">查詢</button>
                    </div>
                    <div id="stock-detail" class="mt-6"></div>
                </div>

                <!-- 持股概覽 -->
                <div class="bg-zinc-900 rounded-3xl p-8">
                    <h4 class="font-medium mb-6">我的持股總覽</h4>
                    <canvas id="portfolio-pie" width="260" height="260" class="mx-auto"></canvas>
                    <div id="portfolio-summary" class="mt-8 space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- 其他頁面（持股、板塊比較、暴跌、追蹤）簡化處理，保留功能 -->
        <div id="page-1" class="page p-8 hidden">我的持股頁面（本地儲存）...</div>
        <div id="page-2" class="page p-8 hidden">板塊比較...</div>
        <div id="page-3" class="page p-8 hidden">暴跌監測完整版...</div>
        <div id="page-4" class="page p-8 hidden">追蹤報告...</div>
    </div>

    <script>
        // ==================== 配置 ====================
        let API_KEY = ''; // Vercel 部署時會被 process.env 取代，或手動填入測試

        const BASE_URL = 'https://api.polygon.io';

        async function apiCall(endpoint) {
            if (!API_KEY) {
                console.warn('⚠️ API_KEY 未設定，請在 Vercel Environment Variables 中加入 API_KEY');
                return null;
            }
            const url = `${BASE_URL}${endpoint}${endpoint.includes('?') ? '&' : '?'}apiKey=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return await res.json();
        }

        // ==================== 即時資料 ====================
        async function updateMarket() {
            try {
                // 1. Snapshot 多檔（指數 + 重點股）
                const tickers = 'SPX,IXIC,DJI,NVDA,AAPL,MSFT,TSLA,AMZN,META,GOOGL';
                const snap = await apiCall(`/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers}`);

                if (snap && snap.tickers) {
                    renderIndices(snap.tickers);
                }

                // 2. 暴跌股票 (Losers)
                const losers = await apiCall('/v2/snapshot/locale/us/markets/stocks/losers?limit=8');
                if (losers && losers.tickers) renderPlunge(losers.tickers);

            } catch (e) {
                console.error(e);
                document.getElementById('market-status').innerHTML = '❌ API 連線失敗 (檢查 Key 或額度)';
            }
        }

        function renderIndices(tickers) {
            const container = document.getElementById('indices-grid');
            let html = '';
            const map = { 'SPX': 'S&P 500', 'IXIC': 'Nasdaq', 'DJI': 'Dow Jones' };

            tickers.forEach(t => {
                const chg = t.todaysChangePerc || 0;
                html += `
                <div class="dashboard-card bg-zinc-900 rounded-3xl p-6">
                    <div class="text-sm text-zinc-400">${map[t.ticker] || t.ticker}</div>
                    <div class="metric-value">${t.lastQuote?.P?.toFixed(2) || t.lastTrade?.p?.toFixed(2) || '-'}</div>
                    <div class="${chg >= 0 ? 'green' : 'red'} text-xl">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderPlunge(tickers) {
            let html = `<table class="w-full"><thead><tr class="text-red-400 text-xs"><th class="text-left px-6 py-4">股票</th><th class="text-right px-6">跌幅</th></tr></thead><tbody>`;
            tickers.slice(0, 8).forEach(t => {
                const chg = t.todaysChangePerc || 0;
                html += `<tr class="border-t border-zinc-800"><td class="px-6 py-4 font-medium">${t.ticker}</td><td class="text-right px-6 text-red-500 font-semibold">${chg.toFixed(1)}%</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('plunge-container').innerHTML = html;
        }

        async function lookupStock() {
            const ticker = document.getElementById('quick-ticker').value.toUpperCase().trim();
            if (!ticker) return;
            try {
                const data = await apiCall(`/v2/snapshot/locale/us/markets/stocks/tickers/${ticker}`);
                if (data && data.ticker) {
                    const t = data.ticker;
                    const price = t.lastTrade?.p || t.lastQuote?.P || '-';
                    const chg = t.todaysChangePerc || 0;
                    document.getElementById('stock-detail').innerHTML = `
                        <div class="bg-black rounded-3xl p-8">
                            <div class="text-6xl font-bold">${ticker} <span class="${chg>=0?'green':'red'} text-3xl">${chg.toFixed(2)}%</span></div>
                            <div class="text-5xl mt-2">$${price}</div>
                            <div class="mt-6 text-sm text-zinc-400">市值 • 本益比等資料可再擴充</div>
                        </div>`;
                }
            } catch(e) { alert('查詢失敗'); }
        }

        // 簡單持股（本地）
        let holdings = JSON.parse(localStorage.getItem('rexHoldings')) || [];
        function renderPortfolio() {
            // 簡化版，實際可再擴充
            document.getElementById('portfolio-summary').innerHTML = `<p class="text-zinc-400">持股總覽（本地儲存）</p>`;
        }

        function refreshAllData() {
            updateMarket();
            alert('🔄 正在刷新即時資料...');
        }

        function navigateTo(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
        }

        // ==================== 初始化 ====================
        window.onload = () => {
            // 如果在 Vercel，API_KEY 會被替換
            if (typeof process !== 'undefined' && process.env && process.env.API_KEY) {
                API_KEY = process.env.API_KEY;
            } else {
                // 本地測試時請手動填入（部署後記得移除！）
                // API_KEY = '你的真實KEY';
            }

            updateMarket();
            setInterval(updateMarket, 60000); // 每60秒刷新（免費方案小心額度）
            renderPortfolio();

            console.log('%c✅ Rex 美股即時儀表板已載入！', 'color:#00d4ff; font-size:14px');
        };
    </script>
</body>
</html>
