<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex 美股雷達 │ 即時版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <!-- 你的儀表板內容（保持不變） -->
    <div class="max-w-screen-2xl mx-auto p-8">
        <h1 class="text-5xl">早安，Rex！</h1>
        <p>正在載入即時資料...</p>
        
        <button onclick="refreshAllData()" class="mt-8 bg-blue-600 px-6 py-3 rounded-xl">手動刷新</button>
    </div>

    <script>
        // === 重要：這裡改用 VITE_API_KEY ===
        const API_KEY = 'YOUR_API_KEY_HERE';   // ← 先手動測試用，之後會被替換

        async function apiCall(endpoint) {
            const url = `https://api.polygon.io${endpoint}${endpoint.includes('?') ? '&' : '?'}apiKey=${API_KEY}`;
            const res = await fetch(url);
            return await res.json();
        }

        async function updateMarket() {
            try {
                const tickers = 'SPX,IXIC,DJI,NVDA,AAPL,MSFT';
                const data = await apiCall(`/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers}`);
                console.log("✅ 成功取得資料", data);
                alert("✅ API 連接成功！資料已載入（請看控制台）");
            } catch(e) {
                console.error(e);
                alert("❌ API 失敗，請確認 Key 正確");
            }
        }

        function refreshAllData() {
            updateMarket();
        }

        window.onload = () => {
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                alert("請先在程式碼中填入 API Key 測試");
            }
            updateMarket();
        };
    </script>
</body>
</html>
